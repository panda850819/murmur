name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spm:
    # macos-15 (Sequoia) runner has Xcode 16 + Swift 6 by default.
    # WhisperKit v1.0.0 uses:
    #   - @retroactive attribute (Swift 6.0+ syntax)
    #   - MLState type (macOS 14+ Core ML API, but WhisperKit declares .macOS(.v13)
    #     in its Package.swift — so SPM compiles WhisperKit at macOS 13 SDK level
    #     unless host SDK is new enough; macos-15 host SDK is macOS 15+ which
    #     covers MLState)
    # macos-14 runner caps at Xcode 15.x / Swift 5.10 — insufficient.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      # Core/ holds the SwiftPM library since Sprint 3 (2026-05-14) restructure.
      # The macOS .app builds via the xcodebuild job below.
      - name: Resolve dependencies
        run: cd Core && swift package resolve

      - name: Build
        run: cd Core && swift build -v

      - name: Test
        run: cd Core && swift test -v

  xcodebuild:
    # Builds the macOS .app via Xcode. scripts/bootstrap.sh regenerates
    # Murmur.xcodeproj (gitignored) from project.yml and patches the
    # XcodeGen 2.45.4 local-package linkage bug. See
    # docs/learnings/pitfalls/2026-05-14-xcodegen-local-package-product-dependency-missing-link.md
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # Pinned: scripts/patch-xcodeproj.py targets the XcodeGen 2.45.4
      # local-package linkage bug specifically. An unpinned `brew install
      # xcodegen` could pull a release where the patch is wrong or a no-op,
      # silently shipping a broken/false-green build. Bump deliberately.
      - name: Install xcodegen 2.45.4 (pinned)
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/xcodegen.zip \
            https://github.com/yonaskolb/XcodeGen/releases/download/2.45.4/xcodegen.zip
          unzip -q /tmp/xcodegen.zip -d /tmp/xcodegen-dist
          XCG_BIN="$(find /tmp/xcodegen-dist -type f -name xcodegen -perm -u+x | head -1)"
          test -n "$XCG_BIN" || { echo "::error::xcodegen binary not found in release zip"; exit 1; }
          dirname "$XCG_BIN" >> "$GITHUB_PATH"

      - name: Verify xcodegen is pinned to 2.45.4
        run: xcodegen --version | grep -q '2\.45\.4' || { echo "::error::xcodegen not 2.45.4"; exit 1; }

      - name: Bootstrap Xcode project
        run: ./scripts/bootstrap.sh

      - name: Build MurmurMac.app
        run: |
          xcodebuild \
            -project Murmur.xcodeproj \
            -scheme MurmurMac \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            ONLY_ACTIVE_ARCH=YES \
            build
