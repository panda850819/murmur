# XcodeGen project spec for Murmur macOS app.
#
# Regenerate with:  xcodegen generate
#
# Structure (locked Sprint 3, 2026-05-14):
# - Root holds the Xcode project (Murmur.xcodeproj, gitignored) which packages
#   MurmurMac.app with Info.plist + entitlements + signing.
# - Core/ holds the Swift Package (MurmurCore library + tests) that the Xcode
#   target depends on. Self-referential XcodeGen package wiring (path: .)
#   produces a broken pbxproj where the product dependency isn't linked back
#   to its package reference, so we live in a subdirectory.
# - WhisperKit is a transitive dep declared in Core/Package.swift, not here —
#   Xcode pulls it through MurmurCore.

name: Murmur
options:
  bundleIdPrefix: com.panda
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false
  groupSortPosition: top

packages:
  MurmurCore:
    path: Core
  WhisperKit:
    # Declared here AND in Core/Package.swift. The Xcode build graph doesn't
    # propagate transitive SPM deps through a local-package product dependency
    # to the consuming target's link/include search paths — same pattern
    # WhisperAX demo uses (explicit at app target). Versions must match exactly.
    url: https://github.com/argmaxinc/WhisperKit
    exactVersion: "1.0.0"

targets:
  MurmurMac:
    type: application
    platform: macOS
    sources:
      - path: Sources/MurmurMac
        excludes:
          - "**/*.md"
          - "Info.plist"
          - "Murmur.entitlements"
    dependencies:
      - package: MurmurCore
        product: MurmurCore
      - package: WhisperKit
        product: WhisperKit
    info:
      path: Sources/MurmurMac/Info.plist
      properties:
        CFBundleDisplayName: Murmur
        CFBundleShortVersionString: "0.0.1"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
        LSUIElement: false
        NSMicrophoneUsageDescription: >-
          Murmur uses your microphone to record short audio clips and
          transcribe them to text on-device.
    entitlements:
      # No `properties:` → XcodeGen uses the checked-in file as-is instead of
      # regenerating it. Sandbox removed in Sprint 5 (signed-DMG distribution,
      # not Mac App Store); see Sources/MurmurMac/Murmur.entitlements header.
      path: Sources/MurmurMac/Murmur.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.panda.murmur
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: true
        SWIFT_STRICT_CONCURRENCY: minimal
